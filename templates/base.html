<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BudgetSemi{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script>
        // Применяем тему ДО рендеринга, чтобы не было мигания
        (function() {
            const saved = localStorage.getItem('bs-theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', saved);
        })();
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="/?year={{ current_year }}&month={{ current_month }}">
                <i class="bi bi-wallet2"></i> BudgetSemi
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/?year={{ current_year }}&month={{ current_month }}">
                            <i class="bi bi-speedometer2"></i> Дашборд
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/entries?year={{ current_year }}&month={{ current_month }}">
                            <i class="bi bi-journal-text"></i> Записи
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/categories">
                            <i class="bi bi-tags"></i> Категории
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/history?year={{ current_year }}&month={{ current_month }}">
                            <i class="bi bi-clock-history"></i> История
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/recommendations?year={{ current_year }}&month={{ current_month }}">
                            <i class="bi bi-lightbulb"></i> Рекомендации
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <!-- Переключатель темы -->
                    <button class="btn btn-outline-light btn-sm me-3" id="theme-toggle" title="Переключить тему">
                        <i class="bi bi-moon-fill" id="theme-icon"></i>
                    </button>
                    <a href="?year={{ prev_year }}&month={{ prev_month }}" class="btn btn-outline-light btn-sm me-2">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <span class="text-light fw-bold">{{ month_name }} {{ current_year }}</span>
                    <a href="?year={{ next_year }}&month={{ next_month }}" class="btn btn-outline-light btn-sm ms-2">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-body-secondary py-3">
        <small>BudgetSemi &copy; {{ current_year }}</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>
        // Переключатель тёмной/светлой темы
        (function() {
            const toggle = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');

            function updateIcon() {
                const current = document.documentElement.getAttribute('data-bs-theme');
                if (current === 'dark') {
                    icon.className = 'bi bi-sun-fill';
                    toggle.title = 'Светлая тема';
                } else {
                    icon.className = 'bi bi-moon-fill';
                    toggle.title = 'Тёмная тема';
                }
            }

            updateIcon();

            toggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-bs-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-bs-theme', next);
                localStorage.setItem('bs-theme', next);
                updateIcon();
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
